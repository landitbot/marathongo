# Fusion strategy v4:
# - Keep train4 path intact at model.0~23 (robot-oriented base path)
# - Add original yolo11s-seg head as an extra branch at model.24~36

nc: 80
scales:
  s: [0.50, 0.50, 1024]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]      # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]     # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]]     # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]     # 5-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]    # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5]]       # 9

head:
  # Branch A: keep train7 full path intact (model.10~23)
  - [-1, 2, C2PSA, [1024]]                         # 10
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]    # 11
  - [[-1, 6], 1, Concat, [1]]                     # 12
  - [-1, 2, C3k2, [512, False]]                   # 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]    # 14
  - [[-1, 4], 1, Concat, [1]]                     # 15
  - [-1, 2, C3k2, [256, False]]                   # 16
  - [-1, 1, Conv, [256, 3, 2]]                    # 17
  - [[-1, 13], 1, Concat, [1]]                    # 18
  - [-1, 2, C3k2, [512, False]]                   # 19
  - [-1, 1, Conv, [512, 3, 2]]                    # 20
  - [[-1, 10], 1, Concat, [1]]                    # 21
  - [-1, 2, C3k2, [1024, True]]                   # 22
  - [[16, 19, 22], 1, Segment, [3, 32, 256]]      # 23 robot head

  # Branch B: add original yolo11s-seg head (model.11~23 -> 24~36)
  - [10, 1, nn.Upsample, [None, 2, "nearest"]]    # 24 = original 11
  - [[-1, 6], 1, Concat, [1]]                     # 25 = original 12
  - [-1, 2, C3k2, [512, False]]                   # 26 = original 13
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]    # 27 = original 14
  - [[-1, 4], 1, Concat, [1]]                     # 28 = original 15
  - [-1, 2, C3k2, [256, False]]                   # 29 = original 16
  - [-1, 1, Conv, [256, 3, 2]]                    # 30 = original 17
  - [[-1, 26], 1, Concat, [1]]                    # 31 = original 18
  - [-1, 2, C3k2, [512, False]]                   # 32 = original 19
  - [-1, 1, Conv, [512, 3, 2]]                    # 33 = original 20
  - [[-1, 10], 1, Concat, [1]]                    # 34 = original 21
  - [-1, 2, C3k2, [1024, True]]                   # 35 = original 22
  - [[29, 32, 35], 1, Segment, [80, 32, 256]]     # 36 person/car head
